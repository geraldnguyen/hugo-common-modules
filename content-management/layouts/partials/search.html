{{- if and .Site.Params.data_api .Site.Params.data_api_title .Site.Params.data_api_link -}}
{{- $searchDataAPI := .Site.Params.data_api -}}
{{- $searchDataTitle := .Site.Params.data_api_title -}}
{{- $searchDataLink := .Site.Params.data_api_link -}}

<style>
/* Header search UI */
.search-icon {
    display: flex;
    align-items: center;
    margin-left: 1rem;
}
.search-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 999px;
    background: #fff;
    color: #374151;
    cursor: pointer;
    transition: all 0.2s ease;
    position:fixed;
    top: 1rem;
    right: 1rem;
    z-index: 1001;
}
.search-toggle:hover,
.search-toggle:focus-visible {
    color: #2563eb;
    border-color: rgba(37, 99, 235, 0.3);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    outline: none;
}
.search-toggle svg {
    width: 1rem;
    height: 1rem;
    fill: currentColor;
}
.search-panel {
    position: absolute;
    top: calc(100% + 0.6rem);
    right: 0;
    z-index: 1002;
    width: min(24rem, calc(100vw - 2rem));
    padding: 0.85rem;
    border: 1px solid #e5e7eb;
    border-radius: 1rem;
    background: #fff;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
}
.search-panel[hidden] {
    display: none;
}
.search-form {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}
.search-input {
    flex: 1;
    min-width: 0;
    padding: 0.7rem 0.9rem;
    border: 1px solid #d1d5db;
    border-radius: 999px;
    background: #fff;
    color: #111827;
    font: inherit;
}
.search-input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}
.search-suggestions {
    list-style: none;
    margin: 0.55rem 0 0;
    padding: 0;
    border: 1px solid #e5e7eb;
    border-radius: 0.8rem;
    overflow: hidden;
    max-height: 14rem;
    overflow-y: auto;
    background: #fff;
}
.search-suggestions[hidden] {
    display: none;
}
.search-suggestion-item + .search-suggestion-item {
    border-top: 1px solid #f1f5f9;
}
.search-suggestion-btn {
    width: 100%;
    border: 0;
    background: transparent;
    text-align: left;
    padding: 0.65rem 0.8rem;
    cursor: pointer;
    color: #1f2937;
    font: inherit;
}
.search-suggestion-btn:hover,
.search-suggestion-btn:focus-visible {
    background: #f8fafc;
    outline: none;
}
.search-suggestion-btn strong {
    color: #0f172a;
    font-weight: 700;
}
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}
@media (max-width:768px) {
    .search-icon {
        margin: 0.75rem 0 0;
        width: 100%;
        justify-content: flex-start;
    }
    .search-panel {
        left: 0;
        right: auto;
        width: calc(100vw - 2rem);
    }
    .search-form {
        flex-direction: column;
        align-items: stretch;
    }
}
</style>

<div class="search-icon">
    <div class="search-data" data-api="{{ $searchDataAPI }}" data-api-title="{{ $searchDataTitle }}" data-api-link="{{ $searchDataLink }}" hidden></div>
    <button type="button" class="search-toggle" aria-expanded="false" aria-controls="site-search-panel" aria-label="Open search">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M10.5 4a6.5 6.5 0 1 0 4.18 11.49l4.41 4.4 1.41-1.41-4.4-4.41A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z" />
        </svg>
    </button>
    <div id="site-search-panel" class="search-panel" hidden>
        <form class="search-form" role="search" onsubmit="return false;">
            <label class="sr-only" for="site-search-query">Search the site</label>
            <input id="site-search-query" class="search-input" type="search" name="q" placeholder="Search the site" autocomplete="off">
        </form>
        <ul id="site-search-suggestions" class="search-suggestions" hidden></ul>
    </div>
</div>

<script src="{{ "js/vendor/jsonpath.min.js" | absURL }}"></script>
<script>
// Header search toggle: open on click, close on outside click or Escape.
document.addEventListener('DOMContentLoaded', function(){
    const searchIcon = document.querySelector('.search-icon');
    if(!searchIcon) return;

    const toggle = searchIcon.querySelector('.search-toggle');
    const panel = searchIcon.querySelector('.search-panel');
    const input = searchIcon.querySelector('.search-input');
    const suggestions = searchIcon.querySelector('.search-suggestions');
    const searchData = searchIcon.querySelector('.search-data');
    if(!toggle || !panel || !input || !suggestions || !searchData) return;

    const dataApi = searchData.dataset.api;
    const dataApiTitlePath = searchData.dataset.apiTitle;
    const dataApiLinkPath = searchData.dataset.apiLink;
    let searchIndex = [];

    function escapeHtml(value){
        return value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function extractByJsonPath(payload, path){
        if(window.jsonpath && typeof window.jsonpath.query === 'function'){
            return window.jsonpath.query(payload, path);
        }

        // Compatibility fallback if another JSONPath implementation is loaded.
        if(window.JSONPath && typeof window.JSONPath.JSONPath === 'function'){
            return window.JSONPath.JSONPath({ path: path, json: payload, wrap: true });
        }
        if(typeof window.JSONPath === 'function'){
            return window.JSONPath({ path: path, json: payload, wrap: true });
        }

        return null;
    }

    function refreshSuggestionsFromInput(){
        const query = input.value.trim();
        if(query.length < 3 || searchIndex.length === 0){
            hideSuggestions();
            return;
        }

        const queryLower = query.toLowerCase();
        const results = searchIndex
            .filter(item => item.title.toLowerCase().includes(queryLower))
            .slice(0, 5);
        renderSuggestions(results);
    }

    function buildSearchIndexFromRecords(rawRecords){
        const seen = new Set();
        const records = (Array.isArray(rawRecords) ? rawRecords : [])
            .filter(item => item && typeof item.title === 'string' && typeof item.link === 'string')
            .map(item => ({
                title: item.title.trim(),
                link: item.link.trim()
            }))
            .filter(item => item.title && item.link)
            .filter(item => {
                const key = item.link.toLowerCase();
                if(seen.has(key)) return false;
                seen.add(key);
                return true;
            });

        if(records.length === 0){
            return false;
        }

        searchIndex = records;
        refreshSuggestionsFromInput();
        return true;
    }

    function getFallbackRecordsFromDOM(){
        return Array.from(document.querySelectorAll('.story-card[data-title]'))
            .map(card => {
                const anchor = card.querySelector('h3 a');
                return {
                    title: anchor ? (anchor.textContent || '') : (card.dataset.title || ''),
                    link: anchor && anchor.getAttribute('href') ? anchor.getAttribute('href') : ''
                };
            });
    }

    function highlightMatches(title, query){
        const titleLower = title.toLowerCase();
        const queryLower = query.toLowerCase();
        const matchIndex = titleLower.indexOf(queryLower);

        if(matchIndex < 0){
            return escapeHtml(title);
        }

        const before = escapeHtml(title.slice(0, matchIndex));
        const match = escapeHtml(title.slice(matchIndex, matchIndex + query.length));
        const after = escapeHtml(title.slice(matchIndex + query.length));
        return before + '<strong>' + match + '</strong>' + after;
    }

    function hideSuggestions(){
        suggestions.hidden = true;
        suggestions.innerHTML = '';
    }

    function renderSuggestions(results){
        suggestions.innerHTML = '';
        if(!results || results.length === 0){
            hideSuggestions();
            return;
        }

        const query = input.value.trim();

        results.forEach(result => {
            const li = document.createElement('li');
            li.className = 'search-suggestion-item';

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'search-suggestion-btn';

            const title = result.title || '';
            const link = result.link || '';
            btn.innerHTML = highlightMatches(title, query);
            btn.addEventListener('click', function(){
                if(!link) return;
                hideSuggestions();
                window.location.href = link;
            });

            li.appendChild(btn);
            suggestions.appendChild(li);
        });

        suggestions.hidden = false;
    }

    async function initSuggestions(){
        if(!dataApi || !dataApiTitlePath || !dataApiLinkPath){
            return;
        }
        const extracted = extractByJsonPath({}, '$');
        if(extracted === null){
            console.warn('Search suggest: JSONPath library not loaded, suggestions disabled.');
            return;
        }

        try {
            const response = await fetch(dataApi, { credentials: 'omit' });
            if(!response.ok){
                throw new Error('Non-200 response from data API.');
            }

            const payload = await response.json();
            const extractedTitles = extractByJsonPath(payload, dataApiTitlePath);
            const extractedLinks = extractByJsonPath(payload, dataApiLinkPath);

            const records = [];
            const maxLen = Math.max(
                Array.isArray(extractedTitles) ? extractedTitles.length : 0,
                Array.isArray(extractedLinks) ? extractedLinks.length : 0
            );

            for(let i = 0; i < maxLen; i++){
                records.push({
                    title: Array.isArray(extractedTitles) ? extractedTitles[i] : '',
                    link: Array.isArray(extractedLinks) ? extractedLinks[i] : ''
                });
            }

            if(!buildSearchIndexFromRecords(records)){
                throw new Error('No title/link records extracted using configured JSONPath.');
            }
        } catch(_e){
            console.error('Search suggest: failed to fetch or process data API, falling back to DOM extraction.', _e);
            const fallbackRecords = getFallbackRecordsFromDOM();
            if(!buildSearchIndexFromRecords(fallbackRecords)){
                // Keep the basic search UI available even if suggestions fail.
                console.warn('Search suggest: failed to fetch or index titles.');
            }
        }
    }

    function openSearch(){
        panel.hidden = false;
        toggle.setAttribute('aria-expanded', 'true');
        searchIcon.classList.add('open');
        window.requestAnimationFrame(() => input.focus());
    }

    function closeSearch(){
        panel.hidden = true;
        toggle.setAttribute('aria-expanded', 'false');
        searchIcon.classList.remove('open');
        hideSuggestions();
    }

    toggle.addEventListener('click', function(e){
        e.preventDefault();
        if(panel.hidden){
            openSearch();
        } else {
            closeSearch();
        }
    });

    document.addEventListener('click', function(e){
        if(!searchIcon.contains(e.target)){
            closeSearch();
        }
    });

    document.addEventListener('keydown', function(e){
        if(e.key === 'Escape'){
            closeSearch();
        }
    });

    input.addEventListener('input', function(){
        refreshSuggestionsFromInput();
    });

    input.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){
            hideSuggestions();
        }
    });

    panel.addEventListener('click', function(e){
        e.stopPropagation();
    });

    initSuggestions();
});
</script>
{{- end -}}
